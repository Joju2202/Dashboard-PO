<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Productos para Pedido</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #111827;
    }

    .dashboard {
      width: 95%;
      max-width: 1200px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .dashboard-header {
      margin-bottom: 24px;
    }

    .dashboard-header h1 {
      margin: 0;
      font-size: 28px;
      color: #111827;
    }

    .dashboard-header p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .metric-card {
      width: 100%;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .metric-title {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .metric-main {
      font-size: 24px;
      color: #111827;
    }

    .metric-values {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .metric-item span {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .metric-item strong {
      font-size: 30px;
    }

    .metric-item.pedidos strong {
      color: #16a34a;
    }

    .metric-item.faltan strong {
      color: #dc2626;
    }

    .status {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .status.ok {
      color: #16a34a;
    }

    .status.error {
      color: #dc2626;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    thead {
      background: #111827;
      color: #ffffff;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
    }

    td input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .checkbox-cell {
      text-align: center;
    }

    .checkbox-cell input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .roi-input {
      font-weight: 600;
    }

    .roi-verde {
      color: #16a34a;
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-add {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-add:hover {
      background: #1d4ed8;
    }

    .btn-refresh {
      background: #111827;
      color: #ffffff;
    }

    .btn-refresh:hover {
      background: #374151;
    }

    @media (max-width: 768px) {
      .metric-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .metric-values {
        width: 100%;
        justify-content: space-between;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="dashboard">

    <section class="dashboard-header">
      <h1>Productos para Pedido</h1>
      <p>Dashboard compartido para agregar productos, revisar precios, ROI y marcar productos listos para que Vic los pida.</p>
    </section>

    <section class="metric-card">
      <div>
        <div class="metric-title">Estado general del pedido</div>
        <strong class="metric-main" id="totalProductos">0 productos agregados</strong>
      </div>

      <div class="metric-values">
        <div class="metric-item pedidos">
          <span>Ya pedidos</span>
          <strong id="productosPedidos">0</strong>
        </div>

        <div class="metric-item faltan">
          <span>Faltan</span>
          <strong id="productosFaltan">0</strong>
        </div>
      </div>
    </section>

    <div id="estadoConexion" class="status">Conectando con la base de datos...</div>

    <section class="table-container">
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>ROI %</th>
            <th>Proveedor</th>
            <th>Pedido</th>
          </tr>
        </thead>

        <tbody id="tablaProductos"></tbody>
      </table>
    </section>

    <section class="actions">
      <button class="btn btn-refresh" onclick="recargarDatos()">Actualizar</button>
      <button class="btn btn-add" onclick="agregarPO()">Agregar PO</button>
    </section>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      remove,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeX3qJ-XsG70nJuknbPO553dIgo4lxfYQ",
      authDomain: "dashboard-po.firebaseapp.com",
      databaseURL: "https://dashboard-po-default-rtdb.firebaseio.com/",
      projectId: "dashboard-po",
      storageBucket: "dashboard-po.firebasestorage.app",
      messagingSenderId: "442676711411",
      appId: "1:442676711411:web:dca7afd452b62149400c86",
      measurementId: "G-NEE7RCEK5F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productosRef = ref(db, "productosPO");

    const tablaProductos = document.getElementById("tablaProductos");
    const totalProductos = document.getElementById("totalProductos");
    const productosPedidos = document.getElementById("productosPedidos");
    const productosFaltan = document.getElementById("productosFaltan");
    const estadoConexion = document.getElementById("estadoConexion");

    let productosActuales = {};
    let cargandoDesdeFirebase = false;

    window.agregarPO = agregarPO;
    window.recargarDatos = recargarDatos;

    function agregarPO() {
      const nuevoProductoRef = push(productosRef);

      set(nuevoProductoRef, {
        producto: "",
        cantidad: "",
        precio: "",
        roi: "",
        proveedor: "",
        pedido: false,
        creadoEn: new Date().toISOString(),
        actualizadoEn: new Date().toISOString()
      });
    }

    function recargarDatos() {
      estadoConexion.textContent = "Actualizando datos...";
      estadoConexion.className = "status";
      escucharCambios();
    }

    function escucharCambios() {
      onValue(productosRef, (snapshot) => {
        productosActuales = snapshot.val() || {};
        renderizarTabla(productosActuales);

        estadoConexion.textContent = "Datos sincronizados en tiempo real.";
        estadoConexion.className = "status ok";
      }, (error) => {
        estadoConexion.textContent = "Error al conectar con la base de datos.";
        estadoConexion.className = "status error";
        console.error(error);
      });
    }

    function renderizarTabla(productos) {
      cargandoDesdeFirebase = true;
      tablaProductos.innerHTML = "";

      const entradas = Object.entries(productos);

      entradas.forEach(([id, data]) => {
        crearFila(id, data);
      });

      cargandoDesdeFirebase = false;
      actualizarMetricas();
    }

    function crearFila(id, data) {
      const fila = document.createElement("tr");
      fila.dataset.id = id;

      fila.innerHTML = `
        <td>
          <input type="text" class="campo-producto" placeholder="Nombre del producto">
        </td>

        <td>
          <input type="number" class="campo-cantidad" placeholder="0" min="0">
        </td>

        <td>
          <input type="number" class="campo-precio" placeholder="$0.00" min="0" step="0.01">
        </td>

        <td>
          <input type="text" class="campo-roi roi-input" placeholder="0%">
        </td>

        <td>
          <input type="text" class="campo-proveedor" placeholder="Proveedor">
        </td>

        <td class="checkbox-cell">
          <input type="checkbox" class="campo-pedido">
        </td>
      `;

      const inputProducto = fila.querySelector(".campo-producto");
      const inputCantidad = fila.querySelector(".campo-cantidad");
      const inputPrecio = fila.querySelector(".campo-precio");
      const inputROI = fila.querySelector(".campo-roi");
      const inputProveedor = fila.querySelector(".campo-proveedor");
      const inputPedido = fila.querySelector(".campo-pedido");

      inputProducto.value = data.producto || "";
      inputCantidad.value = data.cantidad || "";
      inputPrecio.value = data.precio || "";
      inputROI.value = data.roi || "";
      inputProveedor.value = data.proveedor || "";
      inputPedido.checked = data.pedido || false;

      pintarROI(inputROI);

      inputProducto.addEventListener("input", () => guardarCampo(id, "producto", inputProducto.value));
      inputCantidad.addEventListener("input", () => guardarCampo(id, "cantidad", inputCantidad.value));
      inputPrecio.addEventListener("input", () => guardarCampo(id, "precio", inputPrecio.value));
      inputProveedor.addEventListener("input", () => guardarCampo(id, "proveedor", inputProveedor.value));

      inputPedido.addEventListener("change", () => {
        guardarCampo(id, "pedido", inputPedido.checked);
        actualizarMetricas();
      });

      inputROI.addEventListener("input", () => {
        pintarROI(inputROI);
        guardarCampo(id, "roi", inputROI.value);
      });

      inputROI.addEventListener("blur", () => {
        formatearROI(inputROI);
        guardarCampo(id, "roi", inputROI.value);
      });

      tablaProductos.appendChild(fila);
    }

    function guardarCampo(id, campo, valor) {
      if (cargandoDesdeFirebase) return;

      const productoRef = ref(db, `productosPO/${id}`);

      update(productoRef, {
        [campo]: valor,
        actualizadoEn: new Date().toISOString()
      });
    }

    function actualizarMetricas() {
      const filas = tablaProductos.querySelectorAll("tr");
      const total = filas.length;
      const pedidos = tablaProductos.querySelectorAll(".campo-pedido:checked").length;
      const faltan = total - pedidos;

      totalProductos.textContent = `${total} productos agregados`;
      productosPedidos.textContent = pedidos;
      productosFaltan.textContent = faltan;
    }

    function obtenerNumeroROI(valor) {
      return parseFloat(String(valor).replace("%", "").trim());
    }

    function pintarROI(input) {
      const numero = obtenerNumeroROI(input.value);

      input.classList.remove("roi-verde");

      if (!isNaN(numero) && numero >= 15) {
        input.classList.add("roi-verde");
      }
    }

    function formatearROI(input) {
      const numero = obtenerNumeroROI(input.value);

      input.classList.remove("roi-verde");

      if (!isNaN(numero)) {
        input.value = `${numero}%`;

        if (numero >= 15) {
          input.classList.add("roi-verde");
        }
      }
    }

    escucharCambios();
  </script>
</body>
</html>
